components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserUUID:
      in: path
      name: user_uuid
      required: true
      schema:
        type: string
        format: uuid
    ProjectUUID:
      in: path
      name: project_uuid
      required: true
      schema:
        type: string
        format: uuid
    StageUUID:
      in: path
      name: stage_uuid
      required: true
      schema:
        type: string
        format: uuid
    TaskUUID:
      in: path
      name: task_uuid
      required: true
      schema:
        type: string
        format: uuid
    DailyLogUUID:
      in: path
      name: daily_log_uuid
      required: true
      schema:
        type: string
        format: uuid
    FileUUID:
      in: path
      name: file_uuid
      required: true
      schema:
        type: string
        format: uuid

  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_token:
              value:
                error:
                  code: INVALID_TOKEN
                  message: Invalid or expired token.
            invalid_credentials:
              value:
                error:
                  code: INVALID_CREDENTIALS
                  message: Invalid email or password.
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                error:
                  code: FORBIDDEN
                  message: You are not allowed to perform this operation.
            not_project_member:
              value:
                error:
                  code: USER_NOT_PROJECT_MEMBER
                  message: User is not a member of this project.
            not_project_creator:
              value:
                error:
                  code: USER_NOT_PROJECT_CREATOR
                  message: User is not a project creator.
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            user_not_found:
              value:
                error:
                  code: USER_NOT_FOUND
                  message: User not found.
            project_not_found:
              value:
                error:
                  code: PROJECT_NOT_FOUND
                  message: Project not found.
            stage_not_found:
              value:
                error:
                  code: STAGE_NOT_FOUND
                  message: Stage not found.
            task_not_found:
              value:
                error:
                  code: TASK_NOT_FOUND
                  message: Task not found.
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            email_exists:
              value:
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Email already exists.
            user_already_project_member:
              value:
                error:
                  code: USER_ALREADY_PROJECT_MEMBER
                  message: User is already a project member.
            stage_exists:
              value:
                error:
                  code: STAGE_ALREADY_EXISTS
                  message: Stage already exists.
    ValidationError:
      description: Validation or business rule error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_payload:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: Request payload validation failed.
            cant_update_project:
              value:
                error:
                  code: CANT_UPDATE_PROJECT
                  message: Project cannot be updated in current state.
            cant_create_task:
              value:
                error:
                  code: CANT_CREATE_TASK
                  message: Task can be created only in substage.
            cant_update_task:
              value:
                error:
                  code: CANT_UPDATE_TASK
                  message: Task cannot be updated in current state.
            cant_create_subscription:
              value:
                error:
                  code: CANT_CREATE_SUBSCRIPTION
                  message: Subscription cannot be created in current state.
    InternalRepositoryError:
      description: Internal repository error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            repository_error:
              value:
                error:
                  code: REPOSITORY_ERROR
                  message: Internal storage error.
    PaymentGatewayError:
      description: External payment gateway error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            payment_failed:
              value:
                error:
                  code: PAYMENT_FAILED
                  message: Payment gateway failed to create payment.
            payment_not_complete:
              value:
                error:
                  code: PAYMENT_NOT_COMPLETE
                  message: Payment is not completed yet.
            payment_not_exists:
              value:
                error:
                  code: PAYMENT_NOT_EXISTS
                  message: Payment does not exist in gateway.

  schemas:
    ErrorCode:
      type: string
      description: Machine-readable error code.
      enum:
        - INVALID_TOKEN
        - INVALID_CREDENTIALS
        - FORBIDDEN
        - USER_NOT_PROJECT_MEMBER
        - USER_NOT_PROJECT_CREATOR
        - USER_NOT_FOUND
        - PROJECT_NOT_FOUND
        - STAGE_NOT_FOUND
        - TASK_NOT_FOUND
        - DAILY_LOG_NOT_FOUND
        - FILE_NOT_FOUND
        - SUBSCRIPTION_NOT_FOUND
        - PAYMENT_NOT_FOUND
        - EMAIL_ALREADY_EXISTS
        - USER_ALREADY_HAS_PROJECT
        - USER_ALREADY_PROJECT_MEMBER
        - STAGE_ALREADY_EXISTS
        - PARENT_STAGE_ALREADY_HAS_MAIN_SUBSTAGE
        - TASK_ALREADY_EXISTS
        - SUBSCRIPTION_ALREADY_EXISTS
        - FILE_ALREADY_EXISTS
        - MEMBER_NOT_FOUND
        - VALIDATION_ERROR
        - INVALID_DATE
        - CANT_UPDATE_USER
        - CANT_RESET_PASSWORD
        - CANT_UPDATE_PROJECT
        - CANT_CREATE_STAGE
        - CANT_UPDATE_STAGE
        - CANT_CREATE_TASK
        - CANT_UPDATE_TASK
        - CANT_CREATE_SUBSCRIPTION
        - CANT_UPDATE_SUBSCRIPTION
        - CANT_ACTIVATE_SUBSCRIPTION
        - CANT_EXTEND_SUBSCRIPTION
        - CANT_CREATE_PAYMENT
        - CANT_COMPLETE_PAYMENT
        - PAYMENT_FAILED
        - PAYMENT_NOT_COMPLETE
        - PAYMENT_NOT_EXISTS
        - REPOSITORY_ERROR

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    UserRole:
      type: string
      enum: [admin, executor]
    UserStatus:
      type: string
      enum: [active, blocked, archived]
    ProjectStatus:
      type: string
      enum: [active, archived, blocked, completed]
    StageStatus:
      type: string
      enum: [active, completed, archived]
    SubscriptionStatus:
      type: string
      enum: [active, unactive, expired, cancelled]
    PaymentCurrency:
      type: string
      enum: [RUB]

    User:
      type: object
      required: [uuid, name, email, role, status, created_at]
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        created_at:
          type: string
          format: date
        last_login:
          type: string
          format: date
          nullable: true

    Project:
      type: object
      required: [uuid, name, creator, created_at, status]
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 150
        description:
          type: string
          nullable: true
          maxLength: 500
        creator:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/ProjectStatus'
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true

    Stage:
      type: object
      required: [uuid, name, creator, created_at, project, status]
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 150
        description:
          type: string
          nullable: true
          maxLength: 500
        creator:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date
        project:
          $ref: '#/components/schemas/Project'
        parent:
          $ref: '#/components/schemas/StageRef'
        main_path:
          type: boolean
          nullable: true
        status:
          $ref: '#/components/schemas/StageStatus'

    StageRef:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string

    Task:
      type: object
      required: [uuid, name, description, creator, created_at, substage, status]
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        creator:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date
        substage:
          $ref: '#/components/schemas/Stage'
        status:
          type: string
          enum: [pending, in_progress, completed, archived]
        completion_date:
          type: string
          format: date
          nullable: true

    DailyLog:
      type: object
      required: [uuid, creator, project, created_at, draft, hours_spent, description]
      properties:
        uuid:
          type: string
          format: uuid
        creator:
          $ref: '#/components/schemas/User'
        project:
          $ref: '#/components/schemas/Project'
        created_at:
          type: string
          format: date
        updated_at:
          type: string

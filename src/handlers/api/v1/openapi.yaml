  POST /users: [INVALID_TOKEN, FORBIDDEN, EMAIL_ALREADY_EXISTS, VALIDATION_ERROR, REPOSITORY_ERROR]
  GET /users: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, REPOSITORY_ERROR]
  PATCH /users/me: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, EMAIL_ALREADY_EXISTS, VALIDATION_ERROR, CANT_UPDATE_USER, REPOSITORY_ERROR]
  PATCH /users/{user_uuid}: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, EMAIL_ALREADY_EXISTS, VALIDATION_ERROR, CANT_UPDATE_USER, REPOSITORY_ERROR]
  POST /users/password/reset: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, VALIDATION_ERROR, CANT_RESET_PASSWORD, REPOSITORY_ERROR]
  POST /projects: [INVALID_TOKEN, FORBIDDEN, USER_ALREADY_HAS_PROJECT, USER_NOT_FOUND, VALIDATION_ERROR, REPOSITORY_ERROR]
  GET /projects: [INVALID_TOKEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, REPOSITORY_ERROR]
  GET /projects/{project_uuid}: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, REPOSITORY_ERROR]
  PATCH /projects/{project_uuid}: [INVALID_TOKEN, FORBIDDEN, PROJECT_NOT_FOUND, SUBSCRIPTION_NOT_FOUND, USER_ALREADY_HAS_PROJECT, VALIDATION_ERROR, CANT_UPDATE_PROJECT, REPOSITORY_ERROR]
  POST /projects/{project_uuid}/members: [INVALID_TOKEN, FORBIDDEN, PROJECT_NOT_FOUND, USER_NOT_FOUND, USER_ALREADY_PROJECT_MEMBER, REPOSITORY_ERROR]
  DELETE /projects/{project_uuid}/members: [INVALID_TOKEN, FORBIDDEN, PROJECT_NOT_FOUND, MEMBER_NOT_FOUND, REPOSITORY_ERROR]
  POST /stages: [INVALID_TOKEN, FORBIDDEN, PROJECT_NOT_FOUND, USER_NOT_FOUND, STAGE_ALREADY_EXISTS, VALIDATION_ERROR, CANT_CREATE_STAGE, REPOSITORY_ERROR]
  GET /projects/{project_uuid}/stages: [INVALID_TOKEN, FORBIDDEN, PROJECT_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  PATCH /stages/{stage_uuid}: [INVALID_TOKEN, FORBIDDEN, STAGE_NOT_FOUND, USER_NOT_FOUND, VALIDATION_ERROR, CANT_UPDATE_STAGE, REPOSITORY_ERROR]
  DELETE /stages/{stage_uuid}: [INVALID_TOKEN, FORBIDDEN, STAGE_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  POST /tasks: [INVALID_TOKEN, FORBIDDEN, STAGE_NOT_FOUND, USER_NOT_FOUND, TASK_ALREADY_EXISTS, VALIDATION_ERROR, CANT_CREATE_TASK, REPOSITORY_ERROR]
  GET /tasks/{task_uuid}: [INVALID_TOKEN, FORBIDDEN, TASK_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  PATCH /tasks/{task_uuid}: [INVALID_TOKEN, FORBIDDEN, TASK_NOT_FOUND, STAGE_NOT_FOUND, USER_NOT_FOUND, TASK_ALREADY_EXISTS, VALIDATION_ERROR, CANT_UPDATE_TASK, REPOSITORY_ERROR]
  DELETE /tasks/{task_uuid}: [INVALID_TOKEN, FORBIDDEN, TASK_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  GET /stages/{substage_uuid}/tasks: [INVALID_TOKEN, FORBIDDEN, STAGE_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  POST /daily-logs: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, STAGE_NOT_FOUND, INVALID_DATE, VALIDATION_ERROR, REPOSITORY_ERROR]
  GET /daily-logs/{daily_log_uuid}: [INVALID_TOKEN, FORBIDDEN, DAILY_LOG_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  PATCH /daily-logs/{daily_log_uuid}: [INVALID_TOKEN, FORBIDDEN, DAILY_LOG_NOT_FOUND, USER_NOT_FOUND, VALIDATION_ERROR, REPOSITORY_ERROR]
  GET /projects/{project_uuid}/daily-logs: [INVALID_TOKEN, FORBIDDEN, PROJECT_NOT_FOUND, USER_NOT_FOUND, REPOSITORY_ERROR]
  POST /daily-logs/{daily_log_uuid}/files: [INVALID_TOKEN, FORBIDDEN, DAILY_LOG_NOT_FOUND, USER_NOT_FOUND, FILE_ALREADY_EXISTS, REPOSITORY_ERROR]
  GET /daily-logs/{daily_log_uuid}/files: [INVALID_TOKEN, FORBIDDEN, DAILY_LOG_NOT_FOUND, USER_NOT_FOUND, FILE_NOT_FOUND, REPOSITORY_ERROR]
  GET /daily-logs/{daily_log_uuid}/files/{file_uuid}: [INVALID_TOKEN, FORBIDDEN, DAILY_LOG_NOT_FOUND, USER_NOT_FOUND, FILE_NOT_FOUND, REPOSITORY_ERROR]
  DELETE /daily-logs/{daily_log_uuid}/files/{file_uuid}: [INVALID_TOKEN, FORBIDDEN, DAILY_LOG_NOT_FOUND, USER_NOT_FOUND, FILE_NOT_FOUND, REPOSITORY_ERROR]
  POST /subscriptions: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, SUBSCRIPTION_ALREADY_EXISTS, CANT_CREATE_SUBSCRIPTION, REPOSITORY_ERROR]
  PATCH /subscriptions: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, SUBSCRIPTION_NOT_FOUND, CANT_UPDATE_SUBSCRIPTION, REPOSITORY_ERROR]
  POST /subscriptions/activate: [PROJECT_NOT_FOUND, SUBSCRIPTION_NOT_FOUND, PAYMENT_NOT_FOUND, PAYMENT_NOT_COMPLETE, PAYMENT_NOT_EXISTS, CANT_ACTIVATE_SUBSCRIPTION, REPOSITORY_ERROR]
  POST /subscriptions/extend: [PROJECT_NOT_FOUND, SUBSCRIPTION_NOT_FOUND, PAYMENT_NOT_FOUND, PAYMENT_NOT_COMPLETE, PAYMENT_NOT_EXISTS, CANT_EXTEND_SUBSCRIPTION, REPOSITORY_ERROR]
  POST /subscriptions/complete-and-update: [PROJECT_NOT_FOUND, SUBSCRIPTION_NOT_FOUND, PAYMENT_NOT_FOUND, PAYMENT_NOT_COMPLETE, PAYMENT_NOT_EXISTS, CANT_COMPLETE_PAYMENT, CANT_ACTIVATE_SUBSCRIPTION, CANT_EXTEND_SUBSCRIPTION, REPOSITORY_ERROR]
  POST /payments: [INVALID_TOKEN, FORBIDDEN, USER_NOT_FOUND, PROJECT_NOT_FOUND, SUBSCRIPTION_NOT_FOUND, CANT_CREATE_PAYMENT, PAYMENT_FAILED, REPOSITORY_ERROR]
  POST /payments/{payment_uuid}/complete: [PAYMENT_NOT_FOUND, PAYMENT_NOT_COMPLETE, PAYMENT_NOT_EXISTS, CANT_COMPLETE_PAYMENT, REPOSITORY_ERROR]

x-policy-by-endpoint:
  POST /users/login:
    policy: none
    rule: Public endpoint. Valid credentials required.
  POST /users:
    policy: UserAuthorizationPolicy.decide_create_user
    rule: Actor must be admin.
  GET /users:
    policy: UserAuthorizationPolicy.decide_get_users_list
    rule: Requested projects must be within actor accessible projects.
  PATCH /users/me:
    policy: UserAuthorizationPolicy.decide_update_user
    rule: Self-update is allowed, but changing own role/status is restricted by domain rule.
  PATCH /users/{user_uuid}:
    policy: UserAuthorizationPolicy.decide_update_user
    rule: Actor must be target creator.
  POST /users/password/reset:
    policy: UserAuthorizationPolicy.decide_reset_user_password
    rule: Actor must be target creator and cannot reset own password.

  POST /projects:
    policy: ProjectAuthorizationPolicy.decide_create_project
    rule: Actor must be admin.
  GET /projects:
    policy: none
    rule: Returns projects available to current user.
  GET /projects/{project_uuid}:
    policy: ProjectAuthorizationPolicy.decide_get_project
    rule: Actor must be project member.
  PATCH /projects/{project_uuid}:
    policy: ProjectAuthorizationPolicy.decide_update_project
    rule: Actor must be project creator or project admin/member according to policy.
  POST /projects/{project_uuid}/members:
    policy: ProjectAuthorizationPolicy.decide_update_project
    rule: Same access rule as project update.
  DELETE /projects/{project_uuid}/members:
    policy: ProjectAuthorizationPolicy.decide_update_project
    rule: Same access rule as project update.

  POST /stages:
    policy: StageAuthorizationPolicy.decide_create_stage
    rule: Actor must be project member and satisfy stage creation policy.
  GET /projects/{project_uuid}/stages:
    policy: StageAuthorizationPolicy.decide_get_stage_list
    rule: Actor must be project member.
  PATCH /stages/{stage_uuid}:
    policy: StageAuthorizationPolicy.decide_update_stage
    rule: Actor must be project member and satisfy stage update policy.
  DELETE /stages/{stage_uuid}:
    policy: StageAuthorizationPolicy.decide_update_stage
    rule: Same access rule as stage update.

  POST /tasks:
    policy: TaskAuthorizationPolicy.decide_create_task
    rule: Actor must be project member.
  GET /tasks/{task_uuid}:
    policy: TaskAuthorizationPolicy.decide_get_task
    rule: Actor must be project member.
  PATCH /tasks/{task_uuid}:
    policy: TaskAuthorizationPolicy.decide_update_task
    rule: Actor must be project member.
  DELETE /tasks/{task_uuid}:
    policy: TaskAuthorizationPolicy.decide_delete_task
    rule: Actor must be project member.
  GET /stages/{substage_uuid}/tasks:
    policy: TaskAuthorizationPolicy.decide_get_task
    rule: Actor must be project member.

  POST /daily-logs:
    policy: DailyLogAuthorizationPolicy.decide_create_daily_log
    rule: Actor must be allowed by daily log creation policy.
  GET /daily-logs/{daily_log_uuid}:
    policy: DailyLogAuthorizationPolicy.decide_get_daily_log
    rule: Actor must be log creator, project creator, admin, or project member by policy.
  PATCH /daily-logs/{daily_log_uuid}:
    policy: DailyLogAuthorizationPolicy.decide_update_daily_log
    rule: Actor must be daily log creator.
  GET /projects/{project_uuid}/daily-logs:
    policy: DailyLogAuthorizationPolicy.decide_get_daily_log_list
    rule: Actor must be allowed to query target user logs in project context.
  POST /daily-logs/{daily_log_uuid}/files:
    policy: DailyLogAuthorizationPolicy.decide_update_daily_log
    rule: Actor must be daily log creator.
  GET /daily-logs/{daily_log_uuid}/files:
    policy: DailyLogAuthorizationPolicy.decide_get_daily_log
    rule: Same access rule as getting daily log.
  GET /daily-logs/{daily_log_uuid}/files/{file_uuid}:
    policy: DailyLogAuthorizationPolicy.decide_get_daily_log
    rule: Same access rule as getting daily log.
  DELETE /daily-logs/{daily_log_uuid}/files/{file_uuid}:
    policy: DailyLogAuthorizationPolicy.decide_update_daily_log
    rule: Actor must be daily log creator.

  POST /subscriptions:
    policy: SubscriptionAuthorizationPolicy.decide_create_subscription
    rule: Actor must be project creator.
  PATCH /subscriptions:
    policy: SubscriptionAuthorizationPolicy.decide_update_subscription
    rule: Actor must be project creator.
  POST /subscriptions/activate:
    policy: none
    rule: System/payment flow endpoint; enforce server-side trust boundary (internal call or signed webhook).
  POST /subscriptions/extend:
    policy: none
    rule: System/payment flow endpoint; enforce server-side trust boundary (internal call or signed webhook).
  POST /subscriptions/complete-and-update:
    policy: none
    rule: Orchestration endpoint for payment/subscription flow; prefer internal use.

  POST /payments:
    policy: SubscriptionAuthorizationPolicy.decide_create_payment
    rule: Actor must be project creator.
  POST /payments/{payment_uuid}/complete:
    policy: none
    rule: System/payment confirmation endpoint; prefer internal use or signed webhook.

paths:
  /users/login:
    post:
      tags: [Auth]
      summary: Login user
      operationId: loginUser
      x-use-case: LoginUserInteractor
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUserRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalRepositoryError'

  /users:
    post:
      tags: [User]
      summary: Create user
      operationId: createUser
      x-use-case: CreateUserInteractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalRepositoryError'

    get:
      tags: [User]
      summary: Get users list
      operationId: getUsersList
      x-use-case: GetUsersListInteractor
      parameters:
        - in: query
          name: projects_names
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: is_active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalRepositoryError'

  /users/me:
    patch:
      tags: [User]
      summary: Update current user
      operationId: updateCurrentUser
      x-use-case: UpdateUserInteractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalRepositoryError'

  /users/{user_uuid}:
    patch:
      tags: [User]
      summary: Update target user
      operationId: updateUserById
      x-use-case: UpdateUserInteractor
      parameters:
        - $ref: '#/components/parameters/UserUUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/UpdateUserRequest'
                - type: object
                  properties:
                    uuid:
                      type: string
                      format: uuid
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':

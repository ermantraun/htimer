  /tasks:
    post:
      tags: [Task]
      summary: Create task
      operationId: createTask
      x-use-case: CreateTaskInteractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
        '401':

openapi: 3.0.3
info:
  title: HTimer API
  version: 1.0.0
  description: |
    REST API contract from application, domain and policy layers.

    Domain-driven constraints covered in this spec:
    - Authorization is policy-based and may reject valid payloads with 403.
    - Business state transitions are validated in domain entities and return 422 (for example task/stage/project/subscription lifecycle restrictions).
    - Repository and external gateway failures are modeled separately (500 for repository, 502 for payment gateway).

    Key business rules:
    - User creation is restricted to admin actors.
    - Project creation is restricted to admin actors.
    - Subscription/payment creation and subscription update are restricted to project creator.
    - Task creation is allowed only in substage (not root stage).
    - Stage/task/project updates may be blocked by inactive/cancelled subscription or archived/completed statuses.

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: User
  - name: Project
  - name: Stage
  - name: Task
  - name: DailyLog
  - name: DailyLogFile
  - name: Subscription
  - name: Payment

security:
  - bearerAuth: []

x-error-codes-by-endpoint:
